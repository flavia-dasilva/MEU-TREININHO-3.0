<!DOCTYPE html>
<html lang="pt-pt" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Treininho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        @keyframes slideInDown {
            0% { transform: translate(-50%, -100%); opacity: 0; }
            100% { transform: translate(-50%, 0); opacity: 1; }
        }
        .toast-notify { 
            animation: slideInDown 0.3s ease-out forwards; 
        }
        .dragging { opacity: 0.5; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 overflow-x-hidden">
    <div id="root">
        <div class="min-h-screen flex flex-col items-center justify-center p-4 text-center">
            <div class="w-12 h-12 border-4 border-t-blue-500 border-slate-800 rounded-full animate-spin mb-4"></div>
            <p class="text-slate-400 font-bold uppercase tracking-widest text-xs animate-pulse">A preparar o ginásio...</p>
        </div>
    </div>

    <script>
        // --- BIBLIOTECA DE EXERCÍCIOS ---
        const EXERCISE_LIBRARY = {
            "Peito": ["Supino Reto", "Supino Inclinado", "Crucifixo", "Cross Over", "Flexão de Braços", "Peck Deck"],
            "Costas": ["Puxada Alta", "Remada Curvada", "Remada Baixa", "Levantamento Terra", "Puxada com Triângulo", "Barra Fixa"],
            "Tríceps": ["Tríceps Pulley", "Tríceps Corda", "Tríceps Testa", "Tríceps Francês", "Mergulho"],
            "Bíceps": ["Rosca Direta", "Rosca Martelo", "Rosca Scott", "Rosca Concentrada", "Rosca Inversa"],
            "Quadríceps": ["Agachamento Livre", "Leg Press 45", "Cadeira Extensora", "Agachamento Hack", "Afundo"],
            "Coxa (Isquios)": ["Cadeira Flexora", "Mesa Flexora", "Stiff", "Flexora em Pé"],
            "Glúteo": ["Elevação Pélvica", "Glúteo Cabo", "Agachamento Búlgaro", "Abdução de Quadril"],
            "Ombros": ["Desenvolvimento", "Elevação Lateral", "Elevação Frontal", "Crucifixo Inverso"],
            "Panturrilha": ["Panturrilha em Pé", "Panturrilha Sentado", "Panturrilha no Leg Press"],
            "Abdomem": ["Abdominal Supra", "Abdominal Infra", "Prancha Isométrica", "Abdominal Oblíquo"],
            "Cardio": ["Corrida", "Bicicleta", "Caminhada Inclinada", "Elíptico", "Pular Corda"]
        };

        const AVATARS = ['🎀', '🧽', '⭐', '👹', '🐕', '🏋️', '💪', '🐱', '🦍', '⚡'];
        const COLORS = [
            { name: 'Azul', value: '#3b82f6' }, { name: 'Rosa', value: '#ec4899' },
            { name: 'Roxo', value: '#a855f7' }, { name: 'Verde', value: '#22c55e' },
            { name: 'Laranja', value: '#f97316' }, { name: 'Amarelo', value: '#eab308' },
            { name: 'Vermelho', value: '#ef4444' }, { name: 'Cinza', value: '#94a3b8' }
        ];

        const DEFAULT_WORKOUTS = [{ id: '1', name: 'Treino A', exercises: [] }, { id: '2', name: 'Treino B', exercises: [] }];

        let state = {
            view: 'setup',
            workoutTab: 'list',
            searchTerm: '',
            userId: 'local-user',
            user: { name: '', weight: '', height: '', avatar: AVATARS[0], themeColor: COLORS[0].value },
            workouts: JSON.parse(JSON.stringify(DEFAULT_WORKOUTS)),
            history: [],
            weightHistory: [],
            activeWorkoutId: null,
            draggedIdx: null,
            draggedExIdx: null,
            addedFeedback: null,
            feedbackTimeout: null,
            isInitialLoad: true,
            isEditingExercises: false,
            showNamingModal: false,
            tempCustomName: '',
            currentWorkoutDate: new Date().toISOString().split('T')[0],
            confirmModal: { show: false, title: '', message: '', onConfirm: null }
        };

        let db, auth, docRef;

        // Inicialização robusta para evitar travamentos em ambientes locais ou GitHub
        function initApp() {
            try {
                let config = {};
                if (typeof __firebase_config !== 'undefined') {
                    config = typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
                }
                
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'meu-treininho-app';

                if (config && config.apiKey && typeof firebase !== 'undefined') {
                    firebase.initializeApp(config);
                    auth = firebase.auth();
                    db = firebase.firestore();
                    
                    auth.onAuthStateChanged(async (u) => {
                        if (!u) {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await auth.signInWithCustomToken(__initial_auth_token);
                            } else {
                                await auth.signInAnonymously();
                            }
                        } else {
                            state.userId = u.uid;
                            docRef = db.collection('artifacts').doc(appId).collection('users').doc(u.uid).collection('userdata').doc('main');
                            docRef.onSnapshot((snap) => {
                                if (snap.exists) {
                                    processIncomingData(snap.data());
                                    if (state.isInitialLoad) {
                                        if (state.user.name) state.view = 'dashboard';
                                        state.isInitialLoad = false;
                                    }
                                    render();
                                } else { loadLocalData(); render(); }
                            }, () => { loadLocalData(); render(); });
                        }
                    });
                } else {
                    loadLocalData();
                    render();
                }
            } catch (e) {
                console.error("Erro na inicialização:", e);
                loadLocalData();
                render();
            }
        }

        function processIncomingData(data) {
            if (!data) return;
            state.user = data.user || state.user;
            if (state.user.name) {
                state.workouts = data.workouts || state.workouts;
                state.history = data.history || state.history;
                state.weightHistory = data.weightHistory || state.weightHistory;
            }
        }

        function loadLocalData() {
            try {
                const local = localStorage.getItem('meu_treininho_data');
                if (local) {
                    const data = JSON.parse(local);
                    processIncomingData(data);
                    if (state.isInitialLoad && state.user.name) {
                        state.view = 'dashboard';
                        state.isInitialLoad = false;
                    }
                }
            } catch(e) {}
        }

        async function saveData() {
            localStorage.setItem('meu_treininho_data', JSON.stringify({
                user: state.user, workouts: state.workouts, history: state.history, weightHistory: state.weightHistory
            }));
            if (docRef) {
                try {
                    await docRef.set({
                        user: state.user, workouts: state.workouts, history: state.history, 
                        weightHistory: state.weightHistory, lastUpdated: Date.now()
                    }, { merge: true });
                } catch(e) {}
            }
        }

        function changeView(newView) {
            state.view = newView;
            if (newView !== 'workout') {
                state.isEditingExercises = false;
                state.currentWorkoutDate = new Date().toISOString().split('T')[0];
            }
            state.showNamingModal = false;
            render();
        }

        function triggerAddFeedback(name) {
            if (state.feedbackTimeout) clearTimeout(state.feedbackTimeout);
            state.addedFeedback = name;
            render();
            state.feedbackTimeout = setTimeout(() => {
                state.addedFeedback = null;
                render();
            }, 2500);
        }

        function showConfirm(title, message, onConfirm) {
            state.confirmModal = { show: true, title, message, onConfirm };
            render();
        }

        let savedScrollTop = 0;
        let savedWindowScroll = 0;

        function render() {
            const root = document.getElementById('root');
            if (!root) return;

            const activeId = document.activeElement ? document.activeElement.id : null;
            const selectionStart = document.activeElement ? document.activeElement.selectionStart : null;

            const scrollContainer = document.getElementById('exercise-list-container');
            if (scrollContainer) savedScrollTop = scrollContainer.scrollTop;
            savedWindowScroll = window.scrollY;

            root.innerHTML = '';

            if (state.view === 'setup') renderSetup(root);
            else if (state.view === 'dashboard') renderDashboard(root);
            else if (state.view === 'workout') renderWorkout(root);
            else if (state.view === 'progress') renderProgress(root);
            else if (state.view === 'settings') renderSettings(root);

            if (state.showNamingModal) renderNamingModal(root);
            if (state.confirmModal.show) renderConfirmModal(root);

            if (state.addedFeedback) {
                const toast = document.createElement('div');
                toast.className = "fixed top-4 left-1/2 -translate-x-1/2 z-[500] toast-notify w-max max-w-[90vw]";
                toast.innerHTML = `
                    <div class="bg-white text-slate-950 px-5 py-3 rounded-2xl text-[11px] font-black shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex items-center gap-3 border border-slate-200">
                        <i data-lucide="check-circle-2" class="w-4 h-4 text-green-600"></i> 
                        <span>Seu exercício foi adicionado: <span class="uppercase">${state.addedFeedback}</span></span>
                    </div>
                `;
                root.appendChild(toast);
            }

            if (typeof lucide !== 'undefined') lucide.createIcons();

            window.scrollTo(0, savedWindowScroll);
            const newScrollContainer = document.getElementById('exercise-list-container');
            if (newScrollContainer) newScrollContainer.scrollTop = savedScrollTop;

            if (activeId) {
                const el = document.getElementById(activeId);
                if (el) {
                    el.focus();
                    if (selectionStart !== null && (el.type === 'text' || el.type === 'search' || el.type === 'number')) {
                        el.setSelectionRange(selectionStart, selectionStart);
                    }
                }
            }
        }

        function renderConfirmModal(container) {
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 z-[400] flex items-center justify-center p-6 bg-slate-950/90 backdrop-blur-md";
            modal.innerHTML = `
                <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl w-full max-w-xs shadow-2xl space-y-4">
                    <div class="flex flex-col items-center gap-2">
                        <div class="p-3 rounded-full bg-slate-800/50">
                            <i data-lucide="alert-circle" class="w-6 h-6" style="color: ${state.user.themeColor}"></i>
                        </div>
                        <h3 class="font-black text-white text-center uppercase tracking-tight">${state.confirmModal.title}</h3>
                        <p class="text-xs text-slate-400 text-center leading-relaxed">${state.confirmModal.message}</p>
                    </div>
                    <div class="flex gap-2 pt-2">
                        <button id="modal-cancel-btn" class="flex-1 py-3 rounded-xl bg-slate-800 text-slate-400 font-bold text-[10px] uppercase">Não</button>
                        <button id="modal-confirm-btn" class="flex-1 py-3 rounded-xl text-white font-black text-[10px] uppercase shadow-lg transition-transform active:scale-95" style="background-color: ${state.user.themeColor}">Sim</button>
                    </div>
                </div>
            `;
            container.appendChild(modal);
            document.getElementById('modal-cancel-btn').onclick = () => { state.confirmModal.show = false; render(); };
            document.getElementById('modal-confirm-btn').onclick = () => {
                const action = state.confirmModal.onConfirm;
                state.confirmModal.show = false;
                if (action) action();
                render();
            };
        }

        function renderNamingModal(container) {
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-950/90 backdrop-blur-md";
            modal.innerHTML = `
                <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl w-full max-w-sm shadow-2xl space-y-4">
                    <h3 class="font-black text-white text-center uppercase tracking-tighter">Nome do Exercício</h3>
                    <input type="text" id="modal-naming-input" class="w-full px-4 py-3 bg-slate-800 rounded-2xl border border-slate-700 text-white outline-none focus:ring-2" style="--tw-ring-color: ${state.user.themeColor}" placeholder="Ex: Leg Press Vertical" value="${state.tempCustomName}">
                    <div class="flex gap-2 pt-2">
                        <button id="cancel-naming" class="flex-1 py-3 rounded-xl bg-slate-800 text-slate-400 font-bold text-xs uppercase">Cancelar</button>
                        <button id="confirm-naming" class="flex-1 py-3 rounded-xl text-white font-black text-xs uppercase shadow-lg transition-transform active:scale-95" style="background-color: ${state.user.themeColor}">Adicionar</button>
                    </div>
                </div>
            `;
            container.appendChild(modal);
            const input = document.getElementById('modal-naming-input');
            input.focus();
            input.oninput = (e) => state.tempCustomName = e.target.value;
            document.getElementById('cancel-naming').onclick = () => { state.showNamingModal = false; state.tempCustomName = ''; render(); };
            document.getElementById('confirm-naming').onclick = () => {
                const name = state.tempCustomName || "Novo Exercício";
                const current = state.workouts.find(w => w.id === state.activeWorkoutId);
                if (current) {
                    current.exercises.push({ id: Date.now(), group: "Personalizado", name: name, series: '', reps: '', weight: '', done: false });
                    saveData(); state.showNamingModal = false; state.tempCustomName = ''; triggerAddFeedback(name);
                }
            };
        }

        function renderSetup(container) {
            container.className = "min-h-screen bg-slate-950 flex flex-col items-center justify-center p-4 md:p-6 font-sans text-slate-100 overflow-y-auto";
            container.innerHTML = `
                <div class="w-full max-w-sm bg-slate-900 rounded-3xl shadow-2xl p-6 border border-slate-800 my-6 mx-auto">
                    ${state.user.name ? `<button id="back-from-setup" class="mb-3 p-1.5 bg-white/10 rounded-full w-max"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>` : ''}
                    <div class="text-center mb-6">
                        <h1 class="text-2xl font-black italic tracking-tighter uppercase" style="color: ${state.user.themeColor}">Meu Treininho</h1>
                        <p class="text-slate-400 text-xs mt-1">Configura o teu perfil de atleta</p>
                    </div>
                    <form id="setup-form" class="space-y-4">
                        <div><label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Nome</label><input type="text" id="setup-name" required placeholder="Seu nome" class="w-full px-3 py-2 bg-slate-800 rounded-xl border border-slate-700 text-sm text-white outline-none focus:ring-1" style="--tw-ring-color: ${state.user.themeColor}" value="${state.user.name}"></div>
                        <div class="flex gap-3"><div class="flex-1"><label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Peso (kg)</label><input type="number" id="setup-weight" step="0.1" placeholder="75" class="w-full px-3 py-2 bg-slate-800 rounded-xl border border-slate-700 text-sm text-white outline-none focus:ring-1" style="--tw-ring-color: ${state.user.themeColor}" value="${state.user.weight}"></div><div class="flex-1"><label class="text-[10px] font-bold uppercase text-slate-500 mb-1 block">Altura (cm)</label><input type="number" id="setup-height" placeholder="175" class="w-full px-3 py-2 bg-slate-800 rounded-xl border border-slate-700 text-sm text-white outline-none focus:ring-1" style="--tw-ring-color: ${state.user.themeColor}" value="${state.user.height}"></div></div>
                        <div><label class="text-[10px] font-bold uppercase text-slate-500 mb-2 block tracking-widest">Avatar</label><div class="grid grid-cols-5 gap-2">${AVATARS.map(emoji => `<button type="button" class="avatar-btn h-10 rounded-xl flex items-center justify-center text-xl transition-all ${state.user.avatar === emoji ? 'ring-1 bg-slate-700 shadow-md' : 'bg-slate-800 opacity-60'}" data-emoji="${emoji}">${emoji}</button>`).join('')}</div></div>
                        <div><label class="text-[10px] font-bold uppercase text-slate-500 mb-2 block tracking-widest">Cor de Destaque</label><div class="flex justify-between flex-wrap gap-2">${COLORS.map(c => `<button type="button" class="setup-color-btn w-6 h-6 rounded-full border-2 border-slate-900 transition-transform ${state.user.themeColor === c.value ? 'scale-110 shadow-lg border-white/30' : 'opacity-40'}" style="background-color: ${c.value}" data-color="${c.value}"></button>`).join('')}</div></div>
                        <button type="submit" class="w-full py-3 rounded-2xl text-white text-sm font-bold shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2 mt-2" style="background-color: ${state.user.themeColor}">Começar <i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                    </form>
                </div>
            `;
            if (document.getElementById('back-from-setup')) document.getElementById('back-from-setup').onclick = () => changeView('dashboard');
            document.getElementById('setup-name').oninput = (e) => state.user.name = e.target.value;
            document.getElementById('setup-weight').oninput = (e) => state.user.weight = e.target.value;
            document.getElementById('setup-height').oninput = (e) => state.user.height = e.target.value;
            document.querySelectorAll('.avatar-btn').forEach(btn => btn.onclick = () => { state.user.avatar = btn.dataset.emoji; render(); });
            document.querySelectorAll('.setup-color-btn').forEach(btn => btn.onclick = () => { state.user.themeColor = btn.dataset.color; render(); });
            document.getElementById('setup-form').onsubmit = (e) => {
                e.preventDefault();
                if (state.user.weight) state.weightHistory.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], weight: parseFloat(state.user.weight) });
                changeView('dashboard'); saveData();
            };
        }

        function renderDashboard(container) {
            container.className = "min-h-screen bg-slate-950 flex flex-col font-sans pb-24 text-slate-100 overflow-x-hidden";
            container.innerHTML = `
                <div class="pt-4 pb-4 text-white rounded-b-[30px] shadow-lg sticky top-0 z-50 w-full" style="background-color: ${state.user.themeColor}">
                    <div class="max-w-4xl mx-auto px-4 md:px-6 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <button id="back-to-last" class="p-2 bg-white/10 rounded-full border border-white/10 shrink-0"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                            <div class="w-11 h-11 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center text-2xl border border-white/10 shrink-0">${state.user.avatar}</div>
                            <div class="min-w-0">
                                <h2 class="text-[16px] font-black italic tracking-tight uppercase leading-none truncate">${state.user.name}</h2>
                                <div class="flex gap-3 opacity-90 text-[11px] font-bold uppercase tracking-widest mt-1.5">
                                    <span>${state.user.weight || '--'} KG</span>
                                    <span>${state.user.height || '--'} CM</span>
                                </div>
                            </div>
                        </div>
                        <button id="btn-settings" class="p-2 bg-white/10 rounded-full border border-white/10 active:scale-95 shrink-0"><i data-lucide="settings" class="w-4 h-4"></i></button>
                    </div>
                </div>
                <div class="px-4 md:px-6 -mt-3 max-w-4xl mx-auto w-full">
                    <div class="bg-slate-900 rounded-3xl shadow-xl p-5 border border-slate-800">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-black text-slate-100 flex items-center gap-2 text-xs md:text-sm uppercase tracking-wider"><i data-lucide="dumbbell" class="w-4 h-4" style="color:${state.user.themeColor}"></i> Minhas Divisões</h3>
                            <button id="add-workout" class="w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-md active:scale-90" style="background-color: ${state.user.themeColor}"><i data-lucide="plus" class="w-5 h-5"></i></button>
                        </div>
                        <div id="workouts-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                    </div>
                </div>
                ${renderBottomNav()}
            `;
            const list = document.getElementById('workouts-list');
            state.workouts.forEach((w, index) => {
                const isCompleted = w.exercises.length > 0 && w.exercises.every(ex => ex.done);
                const card = document.createElement('div');
                card.draggable = true;
                card.className = `flex flex-col p-4 md:p-5 rounded-2xl border transition-all cursor-pointer hover:bg-slate-700/50 ${isCompleted ? 'bg-green-900/20 border-green-800' : 'bg-slate-800 border-slate-700'}`;
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="text-slate-600 shrink-0"><i data-lucide="grip-vertical" class="w-4 h-4"></i></div>
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center font-black text-white shrink-0" style="background-color: ${isCompleted ? '#166534' : state.user.themeColor}">${isCompleted ? '<i data-lucide="check" class="w-5 h-5"></i>' : '<i data-lucide="dumbbell" class="w-4 h-4"></i>'}</div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold truncate text-sm md:text-base ${isCompleted ? 'text-green-400' : ''}">${w.name}</h4>
                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-tighter">${w.exercises.length} Exercícios</p>
                        </div>
                    </div>
                `;
                card.onclick = () => { state.activeWorkoutId = w.id; state.workoutTab = 'list'; changeView('workout'); };
                card.ondragstart = () => state.draggedIdx = index;
                card.ondragover = (e) => e.preventDefault();
                card.ondrop = () => {
                    const temp = state.workouts[state.draggedIdx];
                    state.workouts.splice(state.draggedIdx, 1);
                    state.workouts.splice(index, 0, temp);
                    saveData(); render();
                };
                list.appendChild(card);
            });
            document.getElementById('back-to-last').onclick = () => changeView('progress');
            document.getElementById('btn-settings').onclick = () => changeView('settings');
            document.getElementById('add-workout').onclick = () => {
                const nextLetter = String.fromCharCode(65 + state.workouts.length);
                state.workouts.push({ id: Date.now(), name: `Treino ${nextLetter}`, exercises: [] });
                saveData(); render();
            };
            attachNavEvents();
        }

        function renderWorkout(container) {
            const current = state.workouts.find(w => w.id === state.activeWorkoutId);
            if (!current) { changeView('dashboard'); return; }
            const isCompleted = current.exercises.length > 0 && current.exercises.every(ex => ex.done);
            
            container.className = "min-h-screen bg-slate-950 flex flex-col font-sans pb-40 text-slate-100 overflow-x-hidden";
            container.innerHTML = `
                <div class="p-2.5 pt-3.5 text-white rounded-b-[30px] shadow-lg sticky top-0 z-50 transition-colors w-full" style="background-color: ${isCompleted ? '#166534' : state.user.themeColor}">
                    <div class="max-w-4xl mx-auto px-4 md:px-6 flex items-center justify-between mb-3">
                        <div class="flex items-center gap-6 md:gap-8 shrink-0">
                            <button id="back-dash" class="p-2 bg-white/10 rounded-full border border-white/10"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                            ${state.isEditingExercises ? 
                                `<button id="finish-edit-ok" class="px-4 py-2 rounded-xl bg-white text-slate-900 font-black text-xs uppercase shadow-lg transition-transform active:scale-95">OK</button>` :
                                `<button id="toggle-edit-mode" class="px-3 py-2 rounded-full border border-white/10 transition-colors bg-white/10 text-white flex items-center gap-2">
                                    <i data-lucide="edit-3" class="w-4 h-4"></i>

                        </div>
                    </div>`).join('')}</div>`;

                document.querySelectorAll('.ex-card-item').forEach(card => {
                    card.ondragstart = () => state.draggedExIdx = parseInt(card.dataset.idx);
                    card.ondragover = (e) => e.preventDefault();
                    card.ondrop = () => {
                        const targetIdx = parseInt(card.dataset.idx);
                        const temp = current.exercises[state.draggedExIdx];
                        current.exercises.splice(state.draggedExIdx, 1);
                        current.exercises.splice(targetIdx, 0, temp);
                        saveData(); render();
                    };
                });

                document.querySelectorAll('.toggle-ex').forEach(btn => btn.onclick = () => { const ex = current.exercises.find(e => e.id == btn.dataset.id); ex.done = !ex.done; saveData(); render(); });
                document.querySelectorAll('.remove-ex').forEach(btn => btn.onclick = () => {
                    showConfirm("Excluir Exercício", "Deseja remover este exercício do treino?", () => {
                        current.exercises = current.exercises.filter(e => e.id != btn.dataset.id); saveData();
                    });
                });
                
                const nameInp = document.getElementById('edit-workout-name');
                if(nameInp) nameInp.oninput = (e) => { current.name = e.target.value; saveData(); };

                document.querySelectorAll('.edit-ex-name').forEach(input => input.oninput = (e) => { const ex = current.exercises.find(ex => ex.id == input.dataset.id); ex.name = e.target.value; saveData(); });

                    const ex = current.exercises.find(ex => ex.id == input.dataset.id);

                    else if (input.id.startsWith('reps-')) ex.reps = e.target.value; 
                    else if (input.id.startsWith('weight-')) ex.weight = e.target.value;

                const dateInp = document.getElementById('finish-date');

                            state.history.unshift(session);
                            current.exercises.forEach(ex => ex.done = true);
                            if (state.workouts.every(w => w.exercises.length > 0 && w.exercises.every(ex => ex.done))) state.workouts.forEach(w => w.exercises.forEach(ex => ex.done = false));

                        saveData();
                        render();

                        <div class="relative mb-3">

                                if (list.length === 0) return '';
                                return `<div class="border-b border-slate-800 pb-4 last:border-0"><p class="text-[10px] font-black text-slate-500 uppercase mb-3 tracking-widest">${group}</p><div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2">${list.map(name => `<button class="lib-add-btn px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-xs font-bold text-slate-400 hover:text-white hover:bg-slate-700 transition-all text-left truncate" data-group="${group}" data-name="${name}">+ ${name}</button>`).join('')}</div></div>`;
                            }).join('')}
                        </div>
                    </div>`;
                document.getElementById('search-input').oninput = (e) => { state.searchTerm = e.target.value; render(); };
                document.getElementById('add-custom-btn').onclick = () => { state.tempCustomName = state.searchTerm; state.showNamingModal = true; render(); };
                document.querySelectorAll('.lib-add-btn').forEach(btn => btn.onclick = () => {
                    const name = btn.dataset.name;
                    current.exercises.push({ id: Date.now(), group: btn.dataset.group, name: name, series: '', reps: '', weight: '', done: false });
                    saveData(); triggerAddFeedback(name);
                });
            }

            const toggleEditBtn = document.getElementById('toggle-edit-mode');
            if (toggleEditBtn) {
                toggleEditBtn.onclick = () => {
                    state.isEditingExercises = true;
                    render();
                };
            }
            document.getElementById('back-dash').onclick = () => changeView('dashboard');
            document.getElementById('delete-active-workout').onclick = () => {
                showConfirm("Excluir Treino", "Deseja excluir permanentemente este treino?", () => {
                    state.workouts = state.workouts.filter(wk => wk.id !== current.id); saveData(); changeView('dashboard');
                });
            };
            document.getElementById('tab-list').onclick = () => { state.workoutTab = 'list'; render(); };
            document.getElementById('tab-add').onclick = () => { state.workoutTab = 'add'; render(); };
        }

        function renderProgress(root) {
            root.className = "min-h-screen bg-slate-950 flex flex-col font-sans pb-32 text-slate-100 overflow-x-hidden";
            root.innerHTML = `
                <div class="pt-3 pb-3 text-white rounded-b-[25px] shadow-lg sticky top-0 z-50 w-full transition-colors" style="background-color: ${state.user.themeColor}">

                state.weightHistory.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], weight: parseFloat(val) });
                state.user.weight = val; saveData(); render();
            };
            document.querySelectorAll('.edit-weight-date').forEach(inp => inp.oninput = (e) => { 
                showConfirm("Editar Data", "Deseja alterar a data deste registo?", () => {
                    const log = state.weightHistory.find(l => l.id == inp.dataset.id); 
                    if(log) { log.date = e.target.value; saveData(); } 
                });
            });
            document.querySelectorAll('.delete-weight').forEach(btn => btn.onclick = () => { 
                showConfirm("Excluir Peso", "Deseja excluir este registo de peso?", () => {
                    state.weightHistory = state.weightHistory.filter(l => l.id != btn.dataset.id); saveData();

            document.querySelectorAll('.edit-session-date').forEach(inp => inp.oninput = (e) => { 
                showConfirm("Editar Data", "Deseja alterar a data deste treino?", () => {
                    const session = state.history.find(s => s.id == inp.dataset.id); 
                    if(session) { session.date = e.target.value; saveData(); } 
                });
            });
            document.querySelectorAll('.delete-session').forEach(btn => btn.onclick = () => { 
                showConfirm("Excluir Sessão", "Deseja excluir este treino do histórico?", () => {
                    state.history = state.history.filter(s => s.id != btn.dataset.id); saveData(); 
                });
            });
            attachNavEvents();
        }

                        <div><label class="text-[10px] font-bold uppercase text-slate-500 mb-2 block tracking-widest">Avatar</label><div class="grid grid-cols-5 gap-2">${AVATARS.map(emoji => `<button type="button" class="avatar-settings-btn h-10 rounded-xl flex items-center justify-center text-2xl transition-all ${state.user.avatar === emoji ? 'ring-1 bg-slate-700 shadow-md' : 'bg-slate-800 opacity-60'}" data-emoji="${emoji}">${emoji}</button>`).join('')}</div></div>
                        <div><label class="text-[10px] font-bold uppercase text-slate-500 mb-2 block tracking-widest">Cor de Destaque</label><div class="flex justify-between flex-wrap gap-2">${COLORS.map(c => `<button type="button" class="color-settings-btn w-7 h-7 rounded-full border-4 border-slate-900 transition-all ${state.user.themeColor === c.value ? 'scale-110 shadow-lg border-white/20' : 'opacity-40'}" style="background-color: ${c.value}" data-color="${c.value}"></button>`).join('')}</div></div>
                        <button id="save-settings" class="w-full py-3.5 rounded-2xl text-white font-black italic uppercase shadow-lg active:scale-95 flex items-center justify-center gap-3 mt-2 text-sm" style="background-color: ${state.user.themeColor}">Guardar Alterações <i data-lucide="check-circle" class="w-5 h-5"></i></button>
                    </div>
                    <div class="bg-slate-900/50 rounded-3xl p-4 border border-slate-800 text-center"><button id="reset-to-setup" class="text-[9px] font-black text-red-500/60 uppercase flex items-center gap-2 mx-auto hover:text-red-500 transition-colors py-1.5 px-3 border border-red-500/20 rounded-xl bg-red-500/5"><i data-lucide="log-out" class="w-3.5 h-3.5"></i> Sair e Reiniciar Perfil</button></div>
                </div>
            `;
            document.getElementById('settings-name').oninput = (e) => state.user.name = e.target.value;
            document.getElementById('settings-weight').oninput = (e) => state.user.weight = e.target.value;
            document.getElementById('settings-height').oninput = (e) => state.user.height = e.target.value;
            document.getElementById('back-dash-settings').onclick = () => changeView('dashboard');
            document.querySelectorAll('.avatar-settings-btn').forEach(btn => btn.onclick = () => { state.user.avatar = btn.dataset.emoji; render(); });
            document.querySelectorAll('.color-settings-btn').forEach(btn => btn.onclick = () => { state.user.themeColor = btn.dataset.color; render(); });
            document.getElementById('save-settings').onclick = () => {
                showConfirm("Deseja alterar", "Deseja atualizar as informações do seu perfil?", () => {
                    const oldWeight = state.user.weight;
                    if (state.user.weight !== oldWeight && state.user.weight) state.weightHistory.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], weight: parseFloat(state.user.weight) });
                    saveData(); changeView('dashboard');
                });
            };
            document.getElementById('reset-to-setup').onclick = () => {
                showConfirm("Sair e Reiniciar", "Tem certeza? Todos os dados serão excluídos localmente.", () => {
                    localStorage.removeItem('meu_treininho_data'); state.user = { name: '', weight: '', height: '', avatar: AVATARS[0], themeColor: COLORS[0].value }; state.workouts = JSON.parse(JSON.stringify(DEFAULT_WORKOUTS)); state.history = []; state.weightHistory = []; state.isInitialLoad = true; changeView('setup');
                });
            };
        }

        function renderBottomNav() {
            return `<div class="fixed bottom-0 left-0 right-0 p-6 flex justify-center z-[60] pointer-events-none"><div class="bg-slate-900/95 backdrop-blur-xl border border-slate-800 shadow-2xl rounded-3xl p-1.5 flex gap-1 pointer-events-auto max-w-md w-full"><button id="nav-dash" class="flex-1 py-3 rounded-2xl flex items-center justify-center gap-2 font-black text-[10px] uppercase tracking-widest transition-all ${state.view === 'dashboard' ? 'text-white' : 'text-slate-500'}" style="${state.view === 'dashboard' ? `background-color: ${state.user.themeColor}` : ''}"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Treinos</button><button id="nav-prog" class="flex-1 py-3 rounded-2xl flex items-center justify-center gap-2 font-black text-[10px] uppercase tracking-widest transition-all ${state.view === 'progress' ? 'text-white' : 'text-slate-500'}" style="${state.view === 'progress' ? `background-color: ${state.user.themeColor}` : ''}"><i data-lucide="trending-up" class="w-4 h-4"></i> Progresso</button></div></div>`;
        }

        function attachNavEvents() {
            if(document.getElementById('nav-dash')) document.getElementById('nav-dash').onclick = () => changeView('dashboard');
            if(document.getElementById('nav-prog')) document.getElementById('nav-prog').onclick = () => changeView('progress');
        }
        
        initApp();
    </script>
</body>
</html>
